name: vernier_news
description: Vernier News — global media intelligence platform client
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Navigation
  go_router: ^17.2.3

  # HTTP client
  dio: ^5.9.2

  # Local storage
  shared_preferences: ^2.5.5

  # Dependency injection
  get_it: ^9.2.1

  # Internationalisation
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
